<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AgriTwin{% endblock %}</title>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- Chart.js for timeseries charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Left navigation bar ── -->
  <nav class="nav-sidebar" aria-label="Main navigation">
    <div class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="#22c55e"/>
        <path d="M8 22 Q12 10 16 14 Q20 18 24 8" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="16" cy="14" r="2.5" fill="white"/>
      </svg>
      <span class="nav-brand-text">AgriTwin</span>
    </div>

    <!-- Scrollable area: nav items + page-specific extras (e.g. layer selector) -->
    <div class="nav-scroll">
      <ul class="nav-menu" role="list">
        <li>
          <a href="{{ url_for('views.map_view') }}"
             class="nav-item {% if request.endpoint == 'views.map_view' %}active{% endif %}"
             aria-current="{% if request.endpoint == 'views.map_view' %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
              <line x1="9" y1="3" x2="9" y2="18"/>
              <line x1="15" y1="6" x2="15" y2="21"/>
            </svg>
            <span class="nav-label">Field Explorer</span>
          </a>
        </li>

        <li>
          <a href="{{ url_for('views.suitability_view') }}"
             class="nav-item {% if request.endpoint == 'views.suitability_view' %}active{% endif %}"
             aria-current="{% if request.endpoint == 'views.suitability_view' %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            <span class="nav-label">Crop Fit</span>
          </a>
        </li>
        <li>
          <a href="{{ url_for('views.yield_profit_view') }}"
             class="nav-item {% if request.endpoint == 'views.yield_profit_view' %}active{% endif %}"
             aria-current="{% if request.endpoint == 'views.yield_profit_view' %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span class="nav-label">Yield &amp; Profit</span>
          </a>
        </li>
        <li>
          <a href="{{ url_for('views.scenario_list_view') }}"
             class="nav-item {% if request.endpoint and request.endpoint.startswith('views.scenario') %}active{% endif %}"
             aria-current="{% if request.endpoint and request.endpoint.startswith('views.scenario') %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span class="nav-label">What-If	</span>
          </a>
        </li>
      </ul>

      <!-- Reference section -->
      <p class="nav-section-label">Reference</p>
      <ul class="nav-menu" role="list">
        <li>
          <a href="{{ url_for('views.docs_view') }}"
             class="nav-item {% if request.endpoint == 'views.docs_view' %}active{% endif %}"
             aria-current="{% if request.endpoint == 'views.docs_view' %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <span class="nav-label">Documentation</span>
          </a>
        </li>
        <li>
          <a href="{{ url_for('views.data_sources_view') }}"
             class="nav-item {% if request.endpoint == 'views.data_sources_view' %}active{% endif %}"
             aria-current="{% if request.endpoint == 'views.data_sources_view' %}page{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M3 5v4c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
              <path d="M3 9v4c0 1.66 4.03 3 9 3s9-1.34 9-3V9"/>
              <path d="M3 13v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4"/>
            </svg>
            <span class="nav-label">Data Sources</span>
          </a>
        </li>
      </ul>

    </div>

    <div class="nav-footer">
      <span class="nav-version">Phase 5/6</span>
    </div>
  </nav>

  <!-- ── Page content ── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
