{% extends "base.html" %}
{% block title %}Monitoring — AgriTwin{% endblock %}

{% block content %}
<!-- Feature selector toolbar -->
<div class="map-toolbar">
  <label for="feature-select" class="toolbar-label">Color by</label>
  <select id="feature-select" class="toolbar-select">
    <option value="elevation">Elevation</option>
    <option value="ndvi">NDVI</option>
    <option value="temperature_2m">Temperature (2m)</option>
    <option value="soil_ph_0-5cm">Soil pH (0–5cm)</option>
  </select>
</div>

<!-- Map container -->
<div id="map"></div>

<!-- Hover tooltip -->
<div id="map-tooltip" class="map-tooltip" hidden></div>

<!-- Cell detail panel (right sidebar) -->
<aside id="cell-panel" class="cell-panel" hidden aria-label="Cell detail">
  <div class="panel-header">
    <div class="panel-title-group">
      <h2 class="panel-title">Cell Detail</h2>
      <code id="panel-h3id" class="panel-h3id"></code>
    </div>
    <button id="panel-close" class="panel-close" aria-label="Close panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Static attributes card -->
  <div class="panel-card">
    <h3 class="panel-card-title">Terrain</h3>
    <dl class="attr-grid">
      <dt>Elevation</dt><dd id="attr-elevation">—</dd>
      <dt>Slope</dt><dd id="attr-slope">—</dd>
      <dt>Aspect</dt><dd id="attr-aspect">—</dd>
    </dl>
  </div>

  <!-- Latest values by category -->
  <div id="panel-features" class="panel-card">
    <h3 class="panel-card-title">Latest Observations</h3>
    <div id="feature-groups"></div>
  </div>

  <!-- Charts -->
  <div class="panel-card">
    <h3 class="panel-card-title">NDVI History</h3>
    <div class="chart-wrap">
      <canvas id="chart-ndvi"></canvas>
    </div>
  </div>

  <div class="panel-card">
    <h3 class="panel-card-title">Temperature &amp; Precipitation</h3>
    <div class="chart-wrap">
      <canvas id="chart-weather"></canvas>
    </div>
  </div>
</aside>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script src="{{ url_for('static', filename='js/panel.js') }}"></script>
{% endblock %}
