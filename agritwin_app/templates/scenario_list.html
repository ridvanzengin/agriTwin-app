{% extends "base.html" %}
{% block title %}What-If — AgriTwin{% endblock %}

{% block content %}
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">What-If Simulations</h1>
    <a href="{{ url_for('views.scenario_new_view') }}" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Create New Scenario
    </a>
  </div>

  <div class="table-card">
    <table class="data-table" id="scenarios-table">
      <thead>
        <tr>
          <th>Scenario Name</th>
          <th>Created</th>
          <th>Status</th>
          <th>Progress</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="scenarios-tbody">
        <tr><td colspan="5" class="table-empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const POLL_INTERVAL_MS = 3000;
let pollTimers = {};

function statusBadge(status) {
  const cls = {
    completed: 'badge-success',
    running:   'badge-warning',
    failed:    'badge-danger',
    pending:   'badge-neutral',
  }[status] || 'badge-neutral';
  const label = status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Pending';
  return `<span class="badge ${cls}">${label}</span>`;
}

function progressBar(status) {
  const pct = status === 'completed' ? 100 : status === 'running' ? 50 : 0;
  const cls = status === 'completed' ? 'progress-fill-success' : 'progress-fill-running';
  return `
    <div class="progress-track">
      <div class="progress-fill ${cls}" style="width:${pct}%"></div>
    </div>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
}

function buildRow(s) {
  return `
    <tr data-id="${s.scenario_id}" data-status="${s.status}">
      <td><a href="/scenarios/${s.scenario_id}" class="link-primary">${escHtml(s.name)}</a></td>
      <td class="text-muted">${fmtDate(s.created_at)}</td>
      <td>${statusBadge(s.status)}</td>
      <td>${progressBar(s.status)}</td>
      <td class="actions-cell">
        <a href="/scenarios/${s.scenario_id}" class="icon-btn" title="View">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </a>
        <button class="icon-btn icon-btn-danger" title="Delete"
                onclick="deleteScenario(${s.scenario_id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </td>
    </tr>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadScenarios() {
  const tbody = document.getElementById('scenarios-tbody');
  const resp = await fetch('/api/scenarios');
  const data = await resp.json();

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No scenarios yet. Create one to get started.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(buildRow).join('');

  // Start polling for any running/pending scenarios
  for (const s of data) {
    if (s.status === 'running' || s.status === 'pending') {
      startPolling(s.scenario_id);
    }
  }
}

function startPolling(id) {
  if (pollTimers[id]) return;
  pollTimers[id] = setInterval(async () => {
    const resp = await fetch(`/api/scenarios/${id}/status`);
    const { status, scored_at } = await resp.json();
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (!row) { stopPolling(id); return; }

    row.querySelector('td:nth-child(3)').innerHTML = statusBadge(status);
    row.querySelector('td:nth-child(4)').innerHTML = progressBar(status);
    row.setAttribute('data-status', status);

    if (status === 'completed' || status === 'failed') {
      stopPolling(id);
      const link = row.querySelector('a.link-primary');
      if (link) link.href = `/scenarios/${id}`;
    }
  }, POLL_INTERVAL_MS);
}

function stopPolling(id) {
  clearInterval(pollTimers[id]);
  delete pollTimers[id];
}

async function deleteScenario(id) {
  if (!confirm('Delete this scenario and all its scores?')) return;
  stopPolling(id);
  await fetch(`/api/scenarios/${id}`, { method: 'DELETE' });
  loadScenarios();
}

loadScenarios();
</script>
{% endblock %}
